<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学数学竞赛游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: #4ade80;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .game-content {
            padding: 30px;
        }

        .start-screen, .end-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .question-type {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.8;
            color: #1e293b;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            text-align: left;
        }

        .option:hover:not(.disabled) {
            background: #e0e7ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }

        .option.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .explanation {
            margin-top: 20px;
            padding: 20px;
            background: #fef3c7;
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation h4 {
            color: #92400e;
            margin-bottom: 10px;
        }

        .explanation p {
            color: #78350f;
            line-height: 1.8;
            white-space: pre-line;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .next-button {
            margin-top: 20px;
            width: 100%;
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .result-message {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .hidden {
            display: none !important;
        }

        /* 奖励提示动画 */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(34, 197, 94, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: pulse-success 0.5s ease-out;
            pointer-events: none;
        }

        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(239, 68, 68, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: shake 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes pulse-success {
            0% { background: rgba(34, 197, 94, 0.5); }
            100% { background: rgba(34, 197, 94, 0.2); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .celebration-text {
            font-size: 80px;
            animation: bounce-in 0.6s ease-out;
        }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }

        .encouragement-text {
            font-size: 60px;
            animation: gentle-bounce 0.6s ease-out;
        }

        @keyframes gentle-bounce {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .score-popup {
            position: fixed;
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            z-index: 1001;
            animation: score-fly 1.5s ease-out forwards;
        }

        @keyframes score-fly {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) scale(1.5);
                opacity: 0;
            }
        }

        .streak-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            z-index: 1002;
            animation: badge-appear 0.5s ease-out;
            display: none;
        }

        @keyframes badge-appear {
            0% { transform: translateX(100px) scale(0); }
            100% { transform: translateX(0) scale(1); }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 14px;
                padding: 12px 16px;
            }

            .stat-number {
                font-size: 24px;
            }

            .celebration-text {
                font-size: 50px;
            }

            .encouragement-text {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <div class="result-icon">📚</div>
            <h2>小学数学竞赛游戏</h2>
            <p style="margin: 20px 0; color: #64748b;">共100道题目，涵盖10种比例题型</p>
            <p style="margin-bottom: 30px; color: #64748b;">准备好了吗？让我们开始吧！</p>
            <button class="button" onclick="startGame()">开始游戏</button>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" class="hidden">
            <div class="header">
                <h1>🏆 小学数学竞赛游戏</h1>
                <p>第 <span id="currentNumber">1</span> / <span id="totalNumber">100</span> 题</p>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div id="correctCount" class="stat-number">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div id="wrongCount" class="stat-number">0</div>
                    <div class="stat-label">错误</div>
                </div>
                <div class="stat-item">
                    <div id="scoreDisplay" class="stat-number">0</div>
                    <div class="stat-label">得分</div>
                </div>
            </div>
            <div class="game-content">
                <div id="questionType" class="question-type"></div>
                <div id="questionText" class="question-text"></div>
                <div id="options" class="options"></div>
                <div id="explanation" class="explanation">
                    <h4>📝 解题思路</h4>
                    <p id="explanationText"></p>
                </div>
                <button id="nextButton" class="button next-button hidden" onclick="nextQuestion()">下一题</button>
            </div>
        </div>

        <!-- 结束界面 -->
        <div id="endScreen" class="end-screen hidden">
            <div id="resultIcon" class="result-icon">🎉</div>
            <h2>游戏结束！</h2>
            <div id="resultScore" class="result-score">0分</div>
            <div id="resultMessage" class="result-message"></div>
            <div style="display: grid; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="button" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 彩带容器 -->
    <div id="confettiContainer"></div>

    <!-- 反馈覆盖层 -->
    <div id="feedbackOverlay" class="hidden"></div>

    <!-- 得分弹出容器 -->
    <div id="scorePopupContainer"></div>

    <!-- 连续答对徽章 -->
    <div id="streakBadge" class="streak-badge">🔥 连续答对: <span id="streakCount">0</span></div>

    <script>
        let problems = [];
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let score = 0;
        let answered = false;
        let streak = 0; // 连续答对计数

        // 加载题目
        async function loadProblems() {
            try {
                const response = await fetch('math_problems.json');
                const data = await response.json();
                problems = data.problems;
                document.getElementById('totalNumber').textContent = problems.length;
            } catch (error) {
                console.error('加载题目失败:', error);
                alert('加载题目失败，请刷新页面重试');
            }
        }

        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            score = 0;
            streak = 0;
            updateStats();
            updateStreakBadge();
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            if (currentIndex >= problems.length) {
                endGame();
                return;
            }

            const problem = problems[currentIndex];
            answered = false;

            document.getElementById('currentNumber').textContent = currentIndex + 1;
            document.getElementById('questionType').textContent = problem.type_name;
            document.getElementById('questionText').textContent = problem.question;
            
            // 更新进度条
            const progress = ((currentIndex) / problems.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 生成选项
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            // 随机打乱选项
            const shuffledOptions = problem.options.map((text, index) => ({
                text,
                isCorrect: index === problem.correct_index,
                originalIndex: index
            }));
            
            // 保存正确答案的位置
            const correctAnswer = problem.options[problem.correct_index];

            problem.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.dataset.index = index;
                optionElement.onclick = () => selectOption(index, problem.correct_index);
                optionsContainer.appendChild(optionElement);
            });

            document.getElementById('explanation').classList.remove('show');
            document.getElementById('nextButton').classList.add('hidden');
        }

        // 创建彩带动画
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff8800', '#88ff00'];
            const shapes = ['■', '●', '▲', '★', '♦'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(confetti);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (confetti.parentNode) {
                        confetti.parentNode.removeChild(confetti);
                    }
                }, 5000);
            }
        }

        // 显示成功覆盖层
        function showSuccessOverlay() {
            const overlay = document.getElementById('feedbackOverlay');
            overlay.className = 'success-overlay';
            overlay.innerHTML = '<div class="celebration-text">🎉</div>';
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 800);
        }

        // 显示错误覆盖层
        function showErrorOverlay() {
            const overlay = document.getElementById('feedbackOverlay');
            overlay.className = 'error-overlay';
            overlay.innerHTML = '<div class="encouragement-text">💪</div>';
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 500);
        }

        // 显示得分弹出
        function showScorePopup(points, isCorrect) {
            const container = document.getElementById('scorePopupContainer');
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = isCorrect ? '+' + points + '分' : '继续加油';
            popup.style.color = isCorrect ? '#22c55e' : '#f59e0b';
            popup.style.left = (Math.random() * 40 + 30) + 'vw';
            popup.style.top = '40vh';
            container.appendChild(popup);
            
            setTimeout(() => {
                if (popup.parentNode) {
                    popup.parentNode.removeChild(popup);
                }
            }, 1500);
        }

        // 更新连续答对计数
        function updateStreak(isCorrect) {
            if (isCorrect) {
                streak++;
            } else {
                streak = 0;
            }
            updateStreakBadge();
            
            // 连续答对有额外奖励
            if (streak >= 3 && isCorrect) {
                const bonusPoints = streak * 2;
                score += bonusPoints;
                showScorePopup(bonusPoints, true);
                
                // 连续答对5题或更多时放彩带
                if (streak >= 5) {
                    createConfetti();
                }
            }
        }

        // 更新连续答对徽章
        function updateStreakBadge() {
            const badge = document.getElementById('streakBadge');
            const countElement = document.getElementById('streakCount');
            
            if (streak >= 2) {
                countElement.textContent = streak;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        // 选择选项
        function selectOption(selectedIndex, correctIndex) {
            if (answered) return;
            answered = true;

            const options = document.querySelectorAll('.option');
            options.forEach(option => option.classList.add('disabled'));

            const isCorrect = selectedIndex === correctIndex;
            
            if (isCorrect) {
                options[selectedIndex].classList.add('correct');
                correctCount++;
                score += 10;
                
                // 显示成功奖励
                showSuccessOverlay();
                showScorePopup(10, true);
                
                // 每答对3题放一次彩带
                if (correctCount % 3 === 0) {
                    createConfetti();
                }
            } else {
                options[selectedIndex].classList.add('wrong');
                options[correctIndex].classList.add('correct');
                wrongCount++;
                
                // 显示错误反馈
                showErrorOverlay();
            }

            // 更新连续答对
            updateStreak(isCorrect);
            updateStats();

            // 显示解析
            const problem = problems[currentIndex];
            document.getElementById('explanationText').textContent = problem.explanation;
            document.getElementById('explanation').classList.add('show');
            document.getElementById('nextButton').classList.remove('hidden');
            document.getElementById('nextButton').textContent = currentIndex < problems.length - 1 ? '下一题' : '查看结果';
        }

        // 下一题
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= problems.length) {
                endGame();
            } else {
                showQuestion();
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('scoreDisplay').textContent = score;
        }

        // 结束游戏
        function endGame() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');

            const percentage = (correctCount / problems.length) * 100;
            document.getElementById('resultScore').textContent = score + '分';

            let icon, message;
            if (percentage >= 90) {
                icon = '🏆';
                message = '太棒了！你是数学小天才！';
            } else if (percentage >= 70) {
                icon = '🌟';
                message = '很不错！继续加油！';
            } else if (percentage >= 50) {
                icon = '💪';
                message = '还可以，再接再厉！';
            } else {
                icon = '📚';
                message = '需要多练习哦！';
            }

            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultMessage').innerHTML = `
                正确：${correctCount} 题<br>
                错误：${wrongCount} 题<br>
                正确率：${percentage.toFixed(1)}%<br><br>
                ${message}
            `;
        }

        // 重新开始
        function restartGame() {
            // 重新洗牌
            problems.sort(() => Math.random() - 0.5);
            startGame();
        }

        // 初始化
        loadProblems();
    </script>
</body>
</html>
