<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 开心贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            color: #00ff88;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(0, 255, 136, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #00ff88;
        }

        .score-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .score-value {
            color: #00ff88;
            font-size: 2em;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn.pause {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
        }

        .btn.reset {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .instructions {
            margin-top: 20px;
            color: #888;
            font-size: 0.9em;
        }

        .instructions p {
            margin: 5px 0;
        }

        .game-over-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff6b6b;
            display: none;
        }

        .game-over-overlay.show {
            display: block;
        }

        .game-over-text {
            color: #ff6b6b;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
        }

        .direction-controls {
            margin-top: 20px;
            display: none;
        }

        .direction-grid {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }

        .dir-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-size: 1.5em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dir-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        .dir-btn:active {
            background: #00ff88;
            color: #1a1a2e;
        }

        .dir-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .direction-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 开心贪吃蛇</h1>
        </div>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高分</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text">游戏结束！</div>
                <button class="btn" onclick="game.resetGame()">重新开始</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="startBtn" onclick="game.start()">开始游戏</button>
            <button class="btn pause" id="pauseBtn" onclick="game.togglePause()" style="display: none;">暂停</button>
            <button class="btn reset" onclick="game.resetGame()">重置</button>
        </div>

        <div class="direction-controls">
            <div class="direction-grid">
                <div></div>
                <button class="dir-btn" onclick="game.setDirection('UP')">↑</button>
                <div></div>
                <button class="dir-btn" onclick="game.setDirection('LEFT')">←</button>
                <div></div>
                <button class="dir-btn" onclick="game.setDirection('RIGHT')">→</button>
                <div></div>
                <button class="dir-btn" onclick="game.setDirection('DOWN')">↓</button>
                <div></div>
            </div>
        </div>

        <div class="instructions">
            <p>⌨️ 使用方向键 ↑ ↓ ← → 或 WASD 控制蛇的移动</p>
            <p>🍎 吃到红色食物可以加分并让蛇变长</p>
            <p>⚠️ 不要撞墙或撞到自己！</p>
        </div>
    </div>

    <script>
        // 游戏常量
        const CELL_SIZE = 20;
        const GRID_WIDTH = 20;
        const GRID_HEIGHT = 20;
        const FPS = 10;

        // 方向定义
        const Direction = {
            UP: { x: 0, y: -1 },
            DOWN: { x: 0, y: 1 },
            LEFT: { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };

        // 颜色定义
        const Colors = {
            BACKGROUND: '#0a0a1a',
            SNAKE: '#00ff88',
            SNAKE_HEAD: '#00cc6a',
            FOOD: '#ff6b6b',
            GRID: '#1a1a2e'
        };

        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreElement = document.getElementById('score');
                this.highScoreElement = document.getElementById('highScore');
                this.gameOverOverlay = document.getElementById('gameOverOverlay');
                this.startBtn = document.getElementById('startBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                
                this.highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
                this.highScoreElement.textContent = this.highScore;
                
                this.gameLoop = null;
                this.isRunning = false;
                this.isPaused = false;
                
                this.resetGame();
                this.setupControls();
                this.draw();
            }

            resetGame() {
                this.snake = [
                    { x: Math.floor(GRID_WIDTH / 2), y: Math.floor(GRID_HEIGHT / 2) }
                ];
                this.direction = Direction.RIGHT;
                this.nextDirection = Direction.RIGHT;
                this.food = this.generateFood();
                this.score = 0;
                this.gameOver = false;
                
                this.scoreElement.textContent = this.score;
                this.gameOverOverlay.classList.remove('show');
                this.startBtn.style.display = 'inline-block';
                this.pauseBtn.style.display = 'none';
                
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
                
                this.isRunning = false;
                this.isPaused = false;
                
                this.draw();
            }

            generateFood() {
                let food;
                do {
                    food = {
                        x: Math.floor(Math.random() * GRID_WIDTH),
                        y: Math.floor(Math.random() * GRID_HEIGHT)
                    };
                } while (this.snake.some(segment => segment.x === food.x && segment.y === food.y));
                return food;
            }

            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (!this.isRunning || this.gameOver) return;
                    
                    switch(e.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            e.preventDefault();
                            if (this.direction !== Direction.DOWN) {
                                this.nextDirection = Direction.UP;
                            }
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            e.preventDefault();
                            if (this.direction !== Direction.UP) {
                                this.nextDirection = Direction.DOWN;
                            }
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            e.preventDefault();
                            if (this.direction !== Direction.RIGHT) {
                                this.nextDirection = Direction.LEFT;
                            }
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            e.preventDefault();
                            if (this.direction !== Direction.LEFT) {
                                this.nextDirection = Direction.RIGHT;
                            }
                            break;
                        case ' ':
                            e.preventDefault();
                            if (!this.isRunning) {
                                this.start();
                            } else if (this.gameOver) {
                                this.resetGame();
                                this.start();
                            } else {
                                this.togglePause();
                            }
                            break;
                    }
                });
            }

            setDirection(dir) {
                if (!this.isRunning || this.gameOver || this.isPaused) return;
                
                const dirMap = {
                    'UP': Direction.UP,
                    'DOWN': Direction.DOWN,
                    'LEFT': Direction.LEFT,
                    'RIGHT': Direction.RIGHT
                };
                
                const newDir = dirMap[dir];
                const opposites = {
                    [Direction.UP]: Direction.DOWN,
                    [Direction.DOWN]: Direction.UP,
                    [Direction.LEFT]: Direction.RIGHT,
                    [Direction.RIGHT]: Direction.LEFT
                };
                
                if (this.direction !== opposites[newDir]) {
                    this.nextDirection = newDir;
                }
            }

            start() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.startBtn.style.display = 'none';
                this.pauseBtn.style.display = 'inline-block';
                this.pauseBtn.textContent = '暂停';
                
                this.gameLoop = setInterval(() => {
                    if (!this.isPaused) {
                        this.update();
                        this.draw();
                    }
                }, 1000 / FPS);
            }

            togglePause() {
                if (!this.isRunning || this.gameOver) return;
                
                this.isPaused = !this.isPaused;
                this.pauseBtn.textContent = this.isPaused ? '继续' : '暂停';
            }

            update() {
                if (this.gameOver) return;

                this.direction = this.nextDirection;
                const head = this.snake[0];
                const newHead = {
                    x: head.x + this.direction.x,
                    y: head.y + this.direction.y
                };

                // 检查墙壁碰撞
                if (newHead.x < 0 || newHead.x >= GRID_WIDTH || 
                    newHead.y < 0 || newHead.y >= GRID_HEIGHT) {
                    this.endGame();
                    return;
                }

                // 检查自身碰撞
                if (this.snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                    this.endGame();
                    return;
                }

                // 移动蛇
                this.snake.unshift(newHead);

                // 检查是否吃到食物
                if (newHead.x === this.food.x && newHead.y === this.food.y) {
                    this.score += 10;
                    this.scoreElement.textContent = this.score;
                    
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        this.highScoreElement.textContent = this.highScore;
                        localStorage.setItem('snakeHighScore', this.highScore);
                    }
                    
                    this.food = this.generateFood();
                } else {
                    this.snake.pop();
                }
            }

            endGame() {
                this.gameOver = true;
                this.isRunning = false;
                
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
                
                this.gameOverOverlay.classList.add('show');
                this.startBtn.style.display = 'inline-block';
                this.pauseBtn.style.display = 'none';
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = Colors.BACKGROUND;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制网格线
                this.ctx.strokeStyle = Colors.GRID;
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= GRID_WIDTH; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * CELL_SIZE, 0);
                    this.ctx.lineTo(i * CELL_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= GRID_HEIGHT; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * CELL_SIZE);
                    this.ctx.lineTo(this.canvas.width, i * CELL_SIZE);
                    this.ctx.stroke();
                }

                // 绘制蛇
                this.snake.forEach((segment, index) => {
                    this.ctx.fillStyle = index === 0 ? Colors.SNAKE_HEAD : Colors.SNAKE;
                    this.ctx.fillRect(
                        segment.x * CELL_SIZE + 1,
                        segment.y * CELL_SIZE + 1,
                        CELL_SIZE - 2,
                        CELL_SIZE - 2
                    );
                    
                    // 蛇头添加眼睛
                    if (index === 0) {
                        this.ctx.fillStyle = '#000';
                        const eyeSize = 3;
                        const eyeOffset = 5;
                        
                        if (this.direction === Direction.RIGHT) {
                            this.ctx.fillRect(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset, segment.y * CELL_SIZE + eyeOffset, eyeSize, eyeSize);
                            this.ctx.fillRect(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                        } else if (this.direction === Direction.LEFT) {
                            this.ctx.fillRect(segment.x * CELL_SIZE + eyeOffset - eyeSize, segment.y * CELL_SIZE + eyeOffset, eyeSize, eyeSize);
                            this.ctx.fillRect(segment.x * CELL_SIZE + eyeOffset - eyeSize, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                        } else if (this.direction === Direction.UP) {
                            this.ctx.fillRect(segment.x * CELL_SIZE + eyeOffset, segment.y * CELL_SIZE + eyeOffset - eyeSize, eyeSize, eyeSize);
                            this.ctx.fillRect(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize, segment.y * CELL_SIZE + eyeOffset - eyeSize, eyeSize, eyeSize);
                        } else {
                            this.ctx.fillRect(segment.x * CELL_SIZE + eyeOffset, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset, eyeSize, eyeSize);
                            this.ctx.fillRect(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset, eyeSize, eyeSize);
                        }
                    }
                });

                // 绘制食物
                this.ctx.fillStyle = Colors.FOOD;
                this.ctx.beginPath();
                this.ctx.arc(
                    this.food.x * CELL_SIZE + CELL_SIZE / 2,
                    this.food.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2 - 2,
                    0,
                    Math.PI * 2
                );
                this.ctx.fill();
                
                // 食物高光
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.beginPath();
                this.ctx.arc(
                    this.food.x * CELL_SIZE + CELL_SIZE / 2 - 3,
                    this.food.y * CELL_SIZE + CELL_SIZE / 2 - 3,
                    3,
                    0,
                    Math.PI * 2
                );
                this.ctx.fill();

                // 绘制暂停提示
                if (this.isPaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    this.ctx.fillStyle = '#ffd700';
                    this.ctx.font = 'bold 30px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('游戏暂停', this.canvas.width / 2, this.canvas.height / 2);
                    
                    this.ctx.font = '16px Arial';
                    this.ctx.fillText('按空格键或点击继续按钮', this.canvas.width / 2, this.canvas.height / 2 + 30);
                }
            }
        }

        // 初始化游戏
        const game = new SnakeGame();
    </script>
</body>
</html>
